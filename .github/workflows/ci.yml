name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WeasyPrint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libcairo2 libffi-dev fonts-liberation

      - name: Install Python deps
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Run tests
        env:
          RAILWAY_DATABASE_PATH: /tmp/portal.db
        run: pytest
